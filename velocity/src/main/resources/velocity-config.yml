# API Bağlantı Adresi
api-url: "api.crafter.net.tr"

# Website ID (dashboard'dan alınır)
website-id: "YOUR_WEBSITE_ID"

# Plugin Secret (dashboard'dan alınan güvenlik anahtarı)
plugin-secret: "YOUR_SECRET"

# Proxy sunucusu için ID (dashboard ile eşleşmeli)
server-id: "my-proxy-1"

reconnect-delay-seconds: 5
max-reconnect-attempts: -1
ping-interval-seconds: 30
debug: false

